# Cucumber configuration
# Feature file location (relative to the project root)
cucumber.features=src/test/resources/features

# Glue (step definitions + support classes)
cucumber.glue=steps,support

# Reporting plugins
cucumber.plugin=pretty,html:target/cucumber-reports/cucumber.html,json:target/cucumber-reports/cucumber.json,junit:target/cucumber-reports/cucumber.xml

# Exclude work-in-progress scenarios by default
cucumber.filter.tags=not @wip

# Enable monochrome output (no ANSI color codes in CI logs)
cucumber.monochrome=true

# Publish report to Cucumber Reports Service (set to true when configured)
cucumber.publish.enabled=false
